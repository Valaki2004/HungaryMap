<!-- {{loggedUser|json}} -->
<div *ngIf="loggedUser" class="card" >
    <div class="card-body">
      <h5 class="card-title">Profile</h5>
        <div class="row">
            <div class="col">
                <img [src]="loggedUser.photoURL" class="img-thumbnail" alt="...">
            <div class="form-floating mb-3">
                <input [(ngModel)]="loggedUser.displayName" type="text" class="form-control " id="floatingInput" disabled>
                <label for="floatingInput">Display name</label>
            </div>   
            <div class="form-floating mb-3">
                <input [(ngModel)]="loggedUser.email" type="email" class="form-control" id="email" disabled>
                <label for="email">E-Mail</label>
            </div>    
    </div>
  </div>
