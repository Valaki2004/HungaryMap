<!-- {{shopDatas|json}} -->
 <div class="egesz">
   <div class="row">
    <div class="col" *ngFor="let data of shopDatas">
      <div class="card" style="width: 18rem;">
        <img class="card-img-top" [src]="data.path"  [alt]="data.alt">
        <div class="card-body">
          <h5 class="card-title">{{data.nev}}</h5>
          <p class="card-text">{{data.ar}}Ft</p>
          <button class="btn btn-outline-primary">Megveszem</button>
        </div>
      </div>
    </div>
   </div>
 </div>


<div class="kereses">
  <div class="row">
    <div class="col">
    <table>
      <thead>
        <tr>
          <h4>Szűrés:</h4>
        </tr>
      </thead>
        <tbody class="row">
              <td>
                <input class="form-control" type="text" placeholder="Keresés árszerint">Ár
              </td>
              <td>
                <input class="form-control"  type="text" placeholder="Keresés kategória szerint">Kategória
              </td>
        </tbody>
      </table>
    </div>
    </div>
  </div>
